name_of_quantlet: Bitcoin Return Direction Prediction
description: >
  Comprehensive quantitative trading project predicting BTC-USD market movements using 
  three distinct methodologies: Logistic Regression, Bidirectional LSTM with 
  Multi-Head Attention, and a Regime-Aligned XGBoost Macro-Quant Predictor. 
  The models integrate Isotonic Regression calibration, Optuna hyperparameter 
  tuning, triple barrier execution, and Kelly criterion position sizing 
  for optimized risk management.
